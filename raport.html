<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raport IPW</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #32373c; --primary-hover: #23272b; --accent: #0693e3; --accent-light: #e8f4fd;
      --bg: #f7f8fa; --card: #ffffff; --text: #1e1e1e; --text-light: #6b7280; --text-muted: #9ca3af;
      --border: #e5e7eb; --success: #10b981; --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 6px 16px rgba(0,0,0,0.04);
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; padding-bottom: 40px; }
    .top-bar { background: #fff; padding: 14px 16px 12px; text-align: center; border-bottom: 3px solid var(--primary); }
    .top-bar img { height: 40px; }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }
    .header { text-align: center; padding: 28px 16px 20px; }
    .header h1 { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 600; color: var(--primary); letter-spacing: 0.5px; margin-bottom: 8px; }
    .header p { font-size: 0.88rem; color: var(--text-light); font-weight: 300; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 120px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); }
    .stat-value { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 600; color: var(--primary); }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 300; margin-top: 2px; }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 14px; border: 1px solid var(--border); }
    .card-title { font-family: 'Oswald', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
    .participant-name { font-weight: 500; color: var(--text); font-size: 1rem; }
    .participant-company { font-weight: 300; color: var(--text-light); font-size: 0.85rem; }
    .participant-date { font-size: 0.75rem; color: var(--text-muted); font-weight: 300; }
    .action-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    .action-table th { background: var(--primary); color: #fff; padding: 8px 10px; text-align: left; font-weight: 500; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .action-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .action-table tr:last-child td { border-bottom: none; }
    .action-table tr:nth-child(even) td { background: #fafbfc; }
    .action-number { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--primary); color: #fff; border-radius: 4px; font-size: 0.75rem; font-weight: 600; font-family: 'Oswald', sans-serif; }
    .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .loading .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .error { text-align: center; padding: 40px 20px; color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); }
    .footer { text-align: center; padding: 20px 16px 4px; font-size: 0.72rem; color: var(--text-muted); font-weight: 300; }
    .param-info { text-align: center; margin-bottom: 16px; font-size: 0.82rem; color: var(--primary); font-weight: 500; background: #eef0f2; padding: 8px 16px; border-radius: 6px; display: inline-block; }
    .header-info { text-align: center; margin-bottom: 20px; }
    @media (max-width: 600px) {
      .container { padding: 10px; }
      .action-table { font-size: 0.8rem; }
      .action-table th, .action-table td { padding: 6px 8px; }
      .stats { flex-direction: column; }
    }
    @media print {
      .top-bar { border-bottom: 2px solid #000; }
      .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
    }
  </style>
</head>

<div class="container">
  <div class="header">
    <h1>Raport zbiorczy IPW</h1>
    <p>Indywidualne Plany Wdro&#380;enia uczestnik&#243;w szkolenia</p>
  </div>

  <div class="header-info">
    <span id="param-info" class="param-info"></span>
  </div>

  <div id="stats" class="stats" style="display:none">
    <div class="stat-card">
      <div class="stat-value" id="stat-count">0</div>
      <div class="stat-label">uczestnik&#243;w</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-actions">0</div>
      <div class="stat-label">dzia&#322;a&#324; &#322;&#261;cznie</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-avg">0</div>
      <div class="stat-label">&#347;r. dzia&#322;a&#324; / osob&#281;</div>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Pobieranie danych...</p>
    </div>
  </div>

  <div class="footer">Enterprise Advisors &middot; Raport IPW</div>
</div>

<script>
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzQ7SPfckgrOv78uUSIduyjg8tkIERGWf2A4KDu7KZkDPD8gYfKLPnTZOEMsaBMJrhvQ/exec';

  var urlParams = new URLSearchParams(window.location.search);
  var paramToken = urlParams.get('token') || '';

  if (!paramToken) {
    document.getElementById('param-info').textContent = 'Brak tokena';
    document.getElementById('content').innerHTML = '<div class="error"><p>Brak tokena dost\u0119pu. Otw\u00F3rz raport z linka w generatorze lub z maila powiadomieniowego.</p></div>';
  } else {
    document.getElementById('param-info').textContent = '\u0141adowanie...';

    var fetchParams = new URLSearchParams();
    fetchParams.set('action', 'raport');
    fetchParams.set('token', paramToken);

    fetch(APPS_SCRIPT_URL + '?' + fetchParams.toString())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === 'ok') {
          var parts = [];
          if (data.szkolenie) parts.push(data.szkolenie);
          if (data.trener) parts.push('Trener: ' + data.trener);
          document.getElementById('param-info').textContent = parts.join(' \u2022 ') || 'Raport';
          renderReport(data);
        } else {
          showError(data.message || 'B\u0142\u0105d pobierania danych.');
        }
      })
      .catch(function(err) {
      showError('Nie uda\u0142o si\u0119 po\u0142\u0105czy\u0107 z serwerem. Spr\u00F3buj ponownie.');
    });
  }

  function renderReport(data) {
    var content = document.getElementById('content');

    if (data.count === 0) {
      content.innerHTML = '<div class="empty"><div class="empty-icon">\uD83D\uDCCB</div><p>Brak wype\u0142nionych plan\u00F3w dla tego szkolenia.</p><p style="margin-top:8px;font-size:0.82rem;">Uczestnicy jeszcze nie wys\u0142ali swoich IPW.</p></div>';
      return;
    }

    // Stats
    var totalActions = 0;
    for (var i = 0; i < data.entries.length; i++) {
      totalActions += data.entries[i].actions.length;
    }
    document.getElementById('stat-count').textContent = data.count;
    document.getElementById('stat-actions').textContent = totalActions;
    document.getElementById('stat-avg').textContent = (totalActions / data.count).toFixed(1);
    document.getElementById('stats').style.display = 'flex';

    // Entries
    var html = '';
    for (var i = 0; i < data.entries.length; i++) {
      var e = data.entries[i];
      html += '<div class="card">';
      html += '<div class="card-title"><span class="action-number">' + (i + 1) + '</span> ';
      html += '<span class="participant-name">' + esc(e.name) + '</span>';
      if (e.company) html += ' <span class="participant-company">&mdash; ' + esc(e.company) + '</span>';
      html += '</div>';
      if (e.data) html += '<div class="participant-date">Wys\u0142ano: ' + esc(e.data) + '</div>';

      if (e.actions.length > 0) {
        html += '<table class="action-table"><thead><tr><th>Nr</th><th>Narz\u0119dzie / metoda</th><th>Opis wdro\u017Cenia</th><th>Termin</th><th>Wsparcie</th></tr></thead><tbody>';
        for (var a = 0; a < e.actions.length; a++) {
          var act = e.actions[a];
          html += '<tr><td>' + (a + 1) + '</td><td>' + esc(act.tool) + '</td><td>' + esc(act.description) + '</td><td>' + esc(act.deadline) + '</td><td>' + esc(act.support) + '</td></tr>';
        }
        html += '</tbody></table>';
      } else {
        html += '<p style="color:var(--text-muted);font-size:0.85rem;margin-top:8px;">Brak dzia\u0142a\u0144.</p>';
      }

      html += '</div>';
    }
    content.innerHTML = html;
  }

  function showError(msg) {
    document.getElementById('content').innerHTML = '<div class="error"><p>' + esc(msg) + '</p></div>';
  }

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>

</body>
</html>
